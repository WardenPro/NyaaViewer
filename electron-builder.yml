appId: com.nyaaviewer.app
productName: NyaaViewer
directories:
  output: release
files:
  - dist
  - dist-electron
  - bin/**/*
win:
  target:
    - nsis
  icon: assets/icon.ico
mac:
  target:
    - dmg
  icon: assets/icon.icns
  category: public.app-category.entertainment
linux:
  target:
    - AppImage
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
