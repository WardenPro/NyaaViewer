appId: com.nyaaviewer.app
productName: NyaaViewer
directories:
  output: release
files:
  - dist
  - dist-electron
extraResources:
  - from: bin
    to: bin
    filter:
      - "**/*"
win:
  target:
    - nsis
  icon: assets/icon.ico
mac:
  target:
    - dmg
    - zip
  icon: assets/icon.icns
  category: public.app-category.entertainment
linux:
  target:
    - AppImage
  category: Utility
publish:
  provider: github
  owner: WardenPro
  repo: NyaaViewer
  releaseType: release
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
